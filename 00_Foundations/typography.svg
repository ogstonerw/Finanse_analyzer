</style>
<rect x="0" y="0" width="1440" height="900" fill="#0B1020" /><text x="32" y="56" font-family="Inter, Arial, sans-serif" font-size="28" fill="#F3F6FC" font-weight="700" text-anchor="start">00_Foundations / Typography</text><text x="32" y="86" font-family="Inter, Arial, sans-serif" font-size="14" fill="#A8B3C7" font-weight="400" text-anchor="start">Inter as the primary typeface. Compact, readable hierarchy for dashboards.</text><rect x="32" y="120" width="676" height="700" rx="16" ry="16" fill="#161F33" stroke="#25314D" stroke-width="1" /><text x="52" y="150" font-family="Inter, Arial, sans-serif" font-size="18" fill="#F3F6FC" font-weight="600" text-anchor="start">Type Scale</text><text x="56" y="168" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F8CA3" font-weight="600" text-anchor="start">H1</text><text x="170" y="168" font-family="Inter, Arial, sans-serif" font-size="12" fill="#A8B3C7" font-weight="600" text-anchor="start">32 / 40 / 700</text><text x="56" y="206" font-family="Inter, Arial, sans-serif" font-size="32" fill="#F3F6FC" font-weight="700" text-anchor="start">Market Reaction Analytics Platform</text><text x="56" y="246" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F8CA3" font-weight="600" text-anchor="start">H2</text><text x="170" y="246" font-family="Inter, Arial, sans-serif" font-size="12" fill="#A8B3C7" font-weight="600" text-anchor="start">24 / 32 / 700</text><text x="56" y="284" font-family="Inter, Arial, sans-serif" font-size="24" fill="#F3F6FC" font-weight="700" text-anchor="start">Dashboard</text><text x="56" y="324" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F8CA3" font-weight="600" text-anchor="start">H3</text><text x="170" y="324" font-family="Inter, Arial, sans-serif" font-size="12" fill="#A8B3C7" font-weight="600" text-anchor="start">20 / 28 / 600</text><text x="56" y="362" font-family="Inter, Arial, sans-serif" font-size="20" fill="#F3F6FC" font-weight="600" text-anchor="start">Latest Forecasts</text><text x="56" y="402" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F8CA3" font-weight="600" text-anchor="start">Section title</text><text x="170" y="402" font-family="Inter, Arial, sans-serif" font-size="12" fill="#A8B3C7" font-weight="600" text-anchor="start">18 / 24 / 600</text><text x="56" y="440" font-family="Inter, Arial, sans-serif" font-size="18" fill="#F3F6FC" font-weight="600" text-anchor="start">Assets in Focus</text><text x="56" y="480" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F8CA3" font-weight="600" text-anchor="start">Body</text><text x="170" y="480" font-family="Inter, Arial, sans-serif" font-size="12" fill="#A8B3C7" font-weight="600" text-anchor="start">15 / 22 / 400</text><text x="56" y="518" font-family="Inter, Arial, sans-serif" font-size="15" fill="#F3F6FC" font-weight="400" text-anchor="start">Open data, market signals and interpretable forecasts combined in one platform.</text><text x="56" y="558" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F8CA3" font-weight="600" text-anchor="start">Small</text><text x="170" y="558" font-family="Inter, Arial, sans-serif" font-size="12" fill="#A8B3C7" font-weight="600" text-anchor="start">13 / 18 / 400</text><text x="56" y="596" font-family="Inter, Arial, sans-serif" font-size="13" fill="#F3F6FC" font-weight="400" text-anchor="start">Tracked instruments and latest analytics state</text><text x="56" y="636" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F8CA3" font-weight="600" text-anchor="start">Caption</text><text x="170" y="636" font-family="Inter, Arial, sans-serif" font-size="12" fill="#A8B3C7" font-weight="600" text-anchor="start">12 / 16 / 500</text><text x="56" y="674" font-family="Inter, Arial, sans-serif" font-size="12" fill="#F3F6FC" font-weight="500" text-anchor="start">Updated 12 minutes ago</text><text x="56" y="714" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F8CA3" font-weight="600" text-anchor="start">Numeric KPI</text><text x="170" y="714" font-family="Inter, Arial, sans-serif" font-size="12" fill="#A8B3C7" font-weight="600" text-anchor="start">28 / 32 / 700</text><text x="56" y="752" font-family="Inter, Arial, sans-serif" font-size="28" fill="#F3F6FC" font-weight="700" text-anchor="start">67 / 100</text><rect x="732" y="120" width="676" height="700" rx="16" ry="16" fill="#161F33" stroke="#25314D" stroke-width="1" /><text x="752" y="150" font-family="Inter, Arial, sans-serif" font-size="18" fill="#F3F6FC" font-weight="600" text-anchor="start">Usage Rules</text><rect x="756" y="154" width="34" height="34" rx="10" ry="10" fill="#1D2740" stroke="#25314D" stroke-width="1" /><text x="773" y="176" font-family="Inter, Arial, sans-serif" font-size="14" fill="#4F7CFF" font-weight="700" text-anchor="middle">1</text><text x="810" y="170" font-family="Inter, Arial, sans-serif" font-size="16" fill="#F3F6FC" font-weight="600" text-anchor="start">Large numbers first</text><text x="810" y="196" font-family="Inter, Arial, sans-serif" font-size="13" fill="#A8B3C7" font-weight="400" text-anchor="start">Use big numeric values for KPI blocks, regime score and price figures.</text><rect x="756" y="246" width="34" height="34" rx="10" ry="10" fill="#1D2740" stroke="#25314D" stroke-width="1" /><text x="773" y="268" font-family="Inter, Arial, sans-serif" font-size="14" fill="#4F7CFF" font-weight="700" text-anchor="middle">2</text><text x="810" y="262" font-family="Inter, Arial, sans-serif" font-size="16" fill="#F3F6FC" font-weight="600" text-anchor="start">Keep labels short</text><text x="810" y="288" font-family="Inter, Arial, sans-serif" font-size="13" fill="#A8B3C7" font-weight="400" text-anchor="start">Prefer concise captions and one-line metric names.</text><rect x="756" y="338" width="34" height="34" rx="10" ry="10" fill="#1D2740" stroke="#25314D" stroke-width="1" /><text x="773" y="360" font-family="Inter, Arial, sans-serif" font-size="14" fill="#4F7CFF" font-weight="700" text-anchor="middle">3</text><text x="810" y="354" font-family="Inter, Arial, sans-serif" font-size="16" fill="#F3F6FC" font-weight="600" text-anchor="start">Use white sparingly</text><text x="810" y="380" font-family="Inter, Arial, sans-serif" font-size="13" fill="#A8B3C7" font-weight="400" text-anchor="start">Pure white only for primary text and high-priority values.</text><rect x="756" y="430" width="34" height="34" rx="10" ry="10" fill="#1D2740" stroke="#25314D" stroke-width="1" /><text x="773" y="452" font-family="Inter, Arial, sans-serif" font-size="14" fill="#4F7CFF" font-weight="700" text-anchor="middle">4</text><text x="810" y="446" font-family="Inter, Arial, sans-serif" font-size="16" fill="#F3F6FC" font-weight="600" text-anchor="start">Secondary information</text><text x="810" y="472" font-family="Inter, Arial, sans-serif" font-size="13" fill="#A8B3C7" font-weight="400" text-anchor="start">Use muted text for timestamps, helper text and axes.</text><rect x="756" y="522" width="34" height="34" rx="10" ry="10" fill="#1D2740" stroke="#25314D" stroke-width="1" /><text x="773" y="544" font-family="Inter, Arial, sans-serif" font-size="14" fill="#4F7CFF" font-weight="700" text-anchor="middle">5</text><text x="810" y="538" font-family="Inter, Arial, sans-serif" font-size="16" fill="#F3F6FC" font-weight="600" text-anchor="start">Compact density</text><text x="810" y="564" font-family="Inter, Arial, sans-serif" font-size="13" fill="#A8B3C7" font-weight="400" text-anchor="start">Keep paragraph content short and structured for fast scanning.</text><rect x="756" y="614" width="34" height="34" rx="10" ry="10" fill="#1D2740" stroke="#25314D" stroke-width="1" /><text x="773" y="636" font-family="Inter, Arial, sans-serif" font-size="14" fill="#4F7CFF" font-weight="700" text-anchor="middle">6</text><text x="810" y="630" font-family="Inter, Arial, sans-serif" font-size="16" fill="#F3F6FC" font-weight="600" text-anchor="start">Consistent hierarchy</text><text x="810" y="656" font-family="Inter, Arial, sans-serif" font-size="13" fill="#A8B3C7" font-weight="400" text-anchor="start">Section title → primary value → supporting context.</text>
</svg>